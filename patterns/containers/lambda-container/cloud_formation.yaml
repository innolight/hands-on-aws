      LoggingConfig:
        LogGroup:
          Ref: LogGroupF5B46931
      MemorySize: 512
      PackageType: Image
      Role:
        Fn::GetAtt:
          - FunctionServiceRole675BB04A
          - Arn
      Timeout: 30
    DependsOn:
      - FunctionServiceRole675BB04A
    Metadata:
      aws:cdk:path: LambdaContainerStack/Function/Resource
  FunctionFunctionUrl08F79AC9:
    Type: AWS::Lambda::Url
    Properties:
      AuthType: NONE
      TargetFunctionArn:
        Fn::GetAtt:
          - Function76856677
          - Arn
    Metadata:
      aws:cdk:path: LambdaContainerStack/Function/FunctionUrl/Resource
  FunctioninvokefunctionurlA70D8F37:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunctionUrl
      FunctionName:
        Fn::GetAtt:
          - Function76856677
          - Arn
      FunctionUrlAuthType: NONE
      Principal: "*"
    Metadata:
      aws:cdk:path: LambdaContainerStack/Function/invoke-function-url
  FunctioninvokefunctionE13A6513:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName:
        Fn::GetAtt:
          - Function76856677
          - Arn
      InvokedViaFunctionUrl: true
      Principal: "*"
    Metadata:
      aws:cdk:path: LambdaContainerStack/Function/invoke-function
  CDKMetadata:
    Type: AWS::CDK::Metadata
    Properties:
      Analytics: v2:deflate64:
    Metadata:
      aws:cdk:path: LambdaContainerStack/CDKMetadata/Default
Outputs:
  FunctionUrl:
    Value:
      Fn::GetAtt:
        - FunctionFunctionUrl08F79AC9
        - FunctionUrl
  FunctionArn:
    Value:
      Fn::GetAtt:
        - Function76856677
        - Arn
  ApiKeySecretArn:
