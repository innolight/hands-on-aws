Resources:
  ApiKeyF9DDEE66:
    Type: AWS::SecretsManager::Secret
    Properties:
      Description: API key for the container Express server
      GenerateSecretString:
        ExcludePunctuation: true
        PasswordLength: 32
    UpdateReplacePolicy: Delete
    DeletionPolicy: Delete
    Metadata:
      aws:cdk:path: LambdaContainerStack/ApiKey/Resource
  LogGroupF5B46931:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/lambda-container
      RetentionInDays: 7
    UpdateReplacePolicy: Delete
    DeletionPolicy: Delete
    Metadata:
      aws:cdk:path: LambdaContainerStack/LogGroup/Resource
  FunctionServiceRole675BB04A:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Statement:
          - Action: sts:AssumeRole
            Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
        Version: "2012-10-17"
      ManagedPolicyArns:
        - Fn::Join:
            - ""
            - - "arn:"
              - Ref: AWS::Partition
              - :iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
    Metadata:
      aws:cdk:path: LambdaContainerStack/Function/ServiceRole/Resource
  Function76856677:
    Type: AWS::Lambda::Function
    Properties:
      Architectures:
        - arm64
      Code:
        ImageUri:
          Fn::Join:
            - ""
            - - 495599779087.dkr.ecr.eu-central-1.
              - Ref: AWS::URLSuffix
              - /hands-on-containers:lambda
      Environment:
        Variables:
          API_KEY:
            Fn::Join:
              - ""
              - - "{{resolve:secretsmanager:"
                - Ref: ApiKeyF9DDEE66
